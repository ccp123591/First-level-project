# 开发环境配置（使用 H2 内存数据库，便于启动）
spring:
  datasource:
    url: jdbc:h2:mem:fitcoach;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      encoding: UTF-8

  # 开发态：H2 + data.sql，Flyway 关闭（生产 prod profile 启用）
  flyway:
    enabled: false

# 开发态：Redis 健康指示器关闭（本地未跑 Redis 时仍可启动），其它健康继续生效
management:
  health:
    redis:
      enabled: false
