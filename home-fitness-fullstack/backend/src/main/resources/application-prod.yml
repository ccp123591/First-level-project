# 生产环境配置（MySQL，需配置环境变量）
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fitcoach}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:fitcoach}
    password: ${DB_PASSWORD:fitcoach}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  # 生产态：Flyway 是 schema 唯一来源；首次启用允许 baseline。
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # 生产关闭 data.sql 自动加载（schema/seed 全部走 Flyway）
  sql:
    init:
      mode: never

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

# JWT — 必须由环境变量注入强随机密钥（JwtUtil @PostConstruct 校验 ≥32 字节，否则启动失败）
jwt:
  secret: ${JWT_SECRET}

# CORS 白名单（逗号分隔）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://fitcoach.example.com}

# AI 教练 / 情感分析（默认 mock；可通过环境变量切到 mimo）
ai:
  coach:
    provider: ${AI_COACH_PROVIDER:mock}
    mimo:
      api-key: ${MIMO_API_KEY:}

# 错误响应：生产隐藏堆栈与详细信息
server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# 日志：生产降级到 INFO
logging:
  level:
    root: INFO
    com.fitcoach: INFO
    org.hibernate: WARN
    org.springframework.security: WARN
  file:
    name: logs/fitcoach.log
