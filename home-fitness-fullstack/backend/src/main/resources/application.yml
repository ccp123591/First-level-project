spring:
  profiles:
    active: dev
  application:
    name: fitcoach-backend

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

server:
  port: 8080
  servlet:
    context-path: /

# JWT 配置
jwt:
  secret: fitcoach-jwt-secret-key-please-change-in-production-2026
  access-token-expire-hours: 2
  refresh-token-expire-days: 30

# AI 教练配置（mock / mimo）
ai:
  coach:
    enabled: true
    provider: ${AI_COACH_PROVIDER:mock}        # mock | mimo
    mimo:
      api-key: ${MIMO_API_KEY:}
      base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1}
      model: ${MIMO_MODEL:mimo-v2-flash}
      max-tokens: 600
      temperature: 0.7
      timeout-seconds: 20

# 文件上传
upload:
  dir: ./uploads
  max-size: 10MB

# 跨域（逗号分隔，供 @Value List<String> 绑定）
cors:
  allowed-origins: http://localhost:5173,http://localhost:4173,http://localhost:8080

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: FitCoach API
    version: 3.0.0

# Actuator 健康检查（只暴露最小必要端点）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志
logging:
  level:
    root: INFO
    com.fitcoach: DEBUG
    org.springframework.security: INFO
