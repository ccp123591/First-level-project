services:
  backend:
    build: ./backend
    image: fitcoach-backend:dev
    container_name: fitcoach-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # dev profile 用 H2 内存 DB；prod profile 需配 MySQL/JWT_SECRET（见下方注释）
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      AI_COACH_PROVIDER: ${AI_COACH_PROVIDER:-mock}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      AI_MEMORY_ENABLED: ${AI_MEMORY_ENABLED:-true}
      VISION_BASE_URL: http://vision-svc:8081
      VISION_TIMEOUT_SECONDS: "30"
      JAVA_OPTS: "-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Xms256m -Xmx512m"
      # —— 切到 prod profile 时需补这些 —— #
      # DB_HOST: mysql
      # DB_NAME: fitcoach
      # DB_USER: fitcoach
      # DB_PASSWORD: ${DB_PASSWORD}
      # JWT_SECRET: ${JWT_SECRET}              # 必须 ≥ 32 字节
      # CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      vision-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [fitcoach]

  redis:
    image: redis:7-alpine
    container_name: fitcoach-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [fitcoach]

  vision-svc:
    build: ./vision-svc
    image: fitcoach-vision-svc:dev
    container_name: fitcoach-vision-svc
    restart: unless-stopped
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/healthz', timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [fitcoach]

  # 仅 prod profile 需要；dev 默认不会启动这个 service（用 docker compose --profile prod up）
  mysql:
    image: mysql:8.0
    container_name: fitcoach-mysql
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: fitcoach
      MYSQL_USER: fitcoach
      MYSQL_PASSWORD: ${DB_PASSWORD:-fitcoach}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [fitcoach]

  frontend:
    build: ./frontend
    image: fitcoach-frontend:dev
    container_name: fitcoach-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [fitcoach]

volumes:
  backend-uploads:
  backend-logs:
  mysql-data:

networks:
  fitcoach:
    driver: bridge
